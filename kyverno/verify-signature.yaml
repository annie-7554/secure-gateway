apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signature
spec:
  validationFailureAction: enforce
  background: false
  rules:
    - name: check-cosign-signature
      match:
        resources:
          kinds:
            - Pod
      verifyImages:
        - image: "*"
          key: |
            -----BEGIN PUBLIC KEY-----
            REPLACE_WITH_COSIGN_PUBLIC_KEY
            -----END PUBLIC KEY-----
