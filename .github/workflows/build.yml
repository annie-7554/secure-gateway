name: Gate 2 - Build & Container Security

# Only run after Gate 1 passes — enforces sequential gate ordering
on:
  workflow_run:
    workflows: ["Gate 1 - Code Security"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Skip if Gate 1 failed (workflow_run events only; workflow_dispatch always runs)


jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    name: Build & Container Security
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      security-events: write  # For uploading SARIF
    outputs:
      image-tag: ${{ steps.image.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      # Set consistent version tag for reproducibility
      - name: Generate image tag
        id: image
        run: |
          echo "tag=devsecops-app:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "Building image: devsecops-app:${{ github.sha }}"

      # Step 1: Build Docker image with secure Dockerfile
      # Why: Secure build baseline (non-root, minimal layers, fixed base image)
      - name: Build Docker image
        run: |
          docker build -t ${{ steps.image.outputs.tag }} \
                       -f docker/Dockerfile .

      # Step 2: Trivy scan - find container vulnerabilities (CVEs in packages)
      # Why: Detect known security issues before pushing to registry
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image.outputs.tag }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      # Upload Trivy findings to GitHub Security tab
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      # Step 3: Generate SBOM (Software Bill of Materials)
      # Why: Supply chain transparency - know what's in your container
      - name: Generate SBOM with syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.image.outputs.tag }}
          format: spdx-json
          output-file: sbom.spdx.json

      # Upload SBOM as artifact for audit/compliance
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 90

      # Step 4: Verify Trivy scan passed (fail build on critical/high vulns)
      - name: Check Trivy scan results
        run: |
          if [ -f trivy-results.sarif ]; then
            # Extract vulnerability count from SARIF
            VULN_COUNT=$(jq '.runs[0].results | length' trivy-results.sarif 2>/dev/null || echo 0)
            if [ "$VULN_COUNT" -gt 0 ]; then
              echo "❌ Container security gate FAILED"
              echo "Found $VULN_COUNT HIGH/CRITICAL vulnerabilities in image"
              echo "Review trivy-results.sarif in GitHub Security tab"
              exit 1
            fi
          fi
          echo "✅ Container security gate PASSED - Image is safe"

      # Summary: Log what Gate 2 verified
      - name: Gate 2 Summary
        run: |
          echo "Gate 2 - Build & Container Security Summary:"
          echo "✓ Dockerfile security: non-root user, minimal base, pinned version"
          echo "✓ Trivy scan: checked for CVEs in base image + dependencies"
          echo "✓ SBOM generated: full package inventory for compliance"
          echo "✓ Build artifacts: image ready for deployment"
