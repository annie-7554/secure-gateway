name: PR Security Gate
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.x
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Run pytest
        run: pytest -q

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.x
      - name: Install semgrep
        run: pip install semgrep
      - name: Run semgrep
        run: |
          semgrep --config .semgrep/rules.yml --sarif --output semgrep.sarif || true
      - name: Upload semgrep SARIF to GitHub code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
        if: always() && hashFiles('semgrep.sarif') != ''
        continue-on-error: true
      - name: Upload semgrep SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif
        if: always()
      - name: Fail if semgrep found issues
        run: |
          FINDINGS=$(jq '[.runs[0].results[] | select(.suppressions == null or (.suppressions | length) == 0)] | length' semgrep.sarif 2>/dev/null || echo 0)
          if [ "$FINDINGS" -gt 0 ]; then
            echo "❌ Semgrep detected $FINDINGS finding(s). Failing job."
            exit 1
          fi
          echo "✅ No semgrep findings."

  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install trufflehog
        run: pip install trufflehog
      - name: Run trufflehog (git history)
        run: |
          trufflehog git --json . > trufflehog.json || rc=$?
          echo "TRUFFLE_RC=${rc:-0}" >> $GITHUB_ENV
      - name: Upload trufflehog artifact
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-results
          path: trufflehog.json
        if: always()
      - name: Fail if trufflehog found findings
        run: |
          if [ -s trufflehog.json ] && grep -q '"reason"' trufflehog.json; then
            echo "TruffleHog found potential secrets. Failing job."
            exit 1
          fi

  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run OWASP Dependency-Check (SARIF)
        continue-on-error: true
        run: |
          mkdir -p dependency-check-scan
          docker run --rm -v "${{ github.workspace }}:/src" -w /src owasp/dependency-check:latest --scan . --format SARIF --out /src/dependency-check-scan
          SARIF_FILE=$(ls dependency-check-scan/*.sarif 2>/dev/null | head -n1 || true)
          if [ -z "$SARIF_FILE" ]; then
            echo "No SARIF generated by dependency-check"
          else
            mv "$SARIF_FILE" dependency-check-scan/dependency-check.sarif || true
            echo "Dependency-Check SARIF generated at dependency-check-scan/dependency-check.sarif"
          fi
      - name: Upload Dependency-Check SARIF to GitHub code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: dependency-check-scan/dependency-check.sarif
        if: always() && hashFiles('dependency-check-scan/dependency-check.sarif') != ''
        continue-on-error: true
      - name: Upload dependency-check SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-sarif
          path: dependency-check-scan/dependency-check.sarif
        if: always()

  ai-advisor:
    runs-on: ubuntu-latest
    needs: [semgrep, trufflehog, dependency-check]
    if: always()
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -q -r requirements.txt
      
      - name: Download semgrep SARIF
        uses: actions/download-artifact@v4
        with:
          name: semgrep-sarif
          path: ./
        continue-on-error: true
      
      - name: Run AI Security Advisor
        id: advisor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 scripts/analyze_findings.py \
            --semgrep-sarif semgrep.sarif \
            --gate gate1 \
            --pr-number ${{ github.event.number }} \
            --output-comment pr-comment.md
        continue-on-error: true
      
      - name: Post PR Comment
        if: hashFiles('pr-comment.md') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('pr-comment.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
        continue-on-error: true
