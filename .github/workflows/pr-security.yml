name: PR Security Gate
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.x
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Run pytest
        run: pytest -q

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.x
      - name: Install semgrep
        run: pip install semgrep
      - name: Run semgrep and capture exit code
        id: semgrep-run
        run: |
          set -o pipefail
          semgrep --config .semgrep/rules.yml --sarif --output semgrep.sarif || rc=$?
          echo "SEMGRC=${rc:-0}" >> $GITHUB_ENV
      - name: Upload semgrep SARIF to GitHub code scanning
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: semgrep.sarif
        if: always()
      - name: Upload semgrep SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif
        if: always()
      - name: Fail if semgrep found issues
        run: |
          if [ "${SEMGRC}" != "0" ]; then
            echo "Semgrep detected issues (exit ${SEMGRC}). Failing job."
            exit ${SEMGRC}
          fi

  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install trufflehog
        run: pip install trufflehog
      - name: Run trufflehog
        run: trufflehog filesystem --entropy=True --max_depth=3 . || true

  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run OWASP Dependency-Check
        uses: docker://owasp/dependency-check:latest
        with:
          args: --scan . --format JSON --out .
