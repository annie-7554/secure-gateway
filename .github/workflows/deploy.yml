name: Gate 3 - Secure Deployment

# Manual trigger for deployment with approval requirement
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to ${{ inputs.environment }}
    # Gate 3 requires approval in production
    # Why: Prevent accidental or malicious deployments - audit trail + human review
    environment:
      name: ${{ inputs.environment }}
      url: https://app.example.com
    permissions:
      contents: read
      id-token: write  # For OIDC token (if using cloud auth)
    steps:
      - uses: actions/checkout@v4

      - name: Log deployment audit trail
        run: |
          echo "Deployment initiated by: ${{ github.actor }}"
          echo "Environment: ${{ inputs.environment }}"
          echo "Commit: ${{ github.sha }}"
          echo "Time: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo ""
          echo "Pre-deployment checks:"
          echo "✓ Code passed Gate 1 (SAST, secrets, dependencies)"
          echo "✓ Container passed Gate 2 (Trivy, SBOM)"
          echo "✓ Environment approval granted"

      # Step 1: Authenticate to Kubernetes cluster
      # Why: Ensure only authorized deployments can reach cluster
      - name: Setup kubeconfig
        run: |
          # In real setup, this would use OIDC token or service account
          # For demo, we document the requirement
          echo "KUBECONFIG would be configured via:"
          echo "  - GitHub OIDC token exchanged for K8s service account"
          echo "  - OR: GitHub secret containing base64-encoded kubeconfig"
          echo ""
          echo "For demo purposes, showing k8s deployment manifest:"

      # Step 2: Deploy to Kubernetes with RBAC enforcement
      # Why: Least privilege - deployment service account has minimal permissions
      - name: Deploy application manifests
        run: |
          echo "Would execute: kubectl apply -f k8s/"
          echo ""
          echo "Deployment enforces:"
          echo "✓ RBAC: deployment can only manage its own resources"
          echo "✓ Network Policy: (optional) restrict pod-to-pod traffic"
          echo "✓ Pod Security: non-root container, read-only filesystem"
          echo "✓ Resource limits: prevent resource exhaustion"

      # Step 3: Verify deployment health
      - name: Verify deployment health
        run: |
          echo "Health checks would verify:"
          echo "✓ Pod is running (ready replicas == desired replicas)"
          echo "✓ Readiness probe passing"
          echo "✓ Application responding to /health endpoint"

      # Step 4: Log deployment completion
      - name: Log deployment completion
        if: success()
        run: |
          echo "✅ Gate 3 - Deployment SUCCESSFUL"
          echo ""
          echo "Deployment completed:"
          echo "  Environment: ${{ inputs.environment }}"
          echo "  Commit: ${{ github.sha }}"
          echo "  Actor: ${{ github.actor }}"
          echo "  Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      # Step 5: Notify on failure
      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Gate 3 - Deployment FAILED"
          echo "Check logs above for failure reason"
          exit 1

  ai-advisor-deployment:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -q anthropic
      
      - name: Generate Deployment Context
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 scripts/analyze_findings.py \
            --gate gate3 \
            --output-summary deployment-context.md
        continue-on-error: true
      
      - name: Upload Deployment Context
        uses: actions/upload-artifact@v4
        with:
          name: deployment-context
          path: deployment-context.md
        if: always()
        continue-on-error: true
