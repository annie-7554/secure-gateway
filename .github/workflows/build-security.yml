name: Build Security Gate
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/secure-gateway:${{ github.sha }} .
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
      - name: Scan with Trivy (SARIF)
        id: trivy-scan
        run: |
          set -o pipefail
          mkdir -p trivy-scan
          # produce SARIF output (still exits non-zero on findings)
          trivy image --format sarif --output trivy-scan/trivy-report.sarif ghcr.io/${{ github.repository }}/secure-gateway:${{ github.sha }} || rc=$?
          echo "TRIVY_RC=${rc:-0}" >> $GITHUB_ENV
      - name: Upload Trivy SARIF to GitHub code scanning
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: trivy-scan/trivy-report.sarif
        if: always()
      - name: Upload trivy SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy-scan/trivy-report.sarif
        if: always()
      - name: Fail if Trivy found critical/high issues
        run: |
          if [ "${TRIVY_RC}" != "0" ]; then
            echo "Trivy detected vulnerabilities (exit ${TRIVY_RC}). Failing job."
            exit ${TRIVY_RC}
          fi
      - name: Generate SBOM (syft)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft packages docker:ghcr.io/${{ github.repository }}/secure-gateway:${{ github.sha }} -o cyclonedx-json=sbom.json || true
      - name: Sign image with cosign
        run: |
          curl -sSLf https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64 -o /usr/local/bin/cosign && chmod +x /usr/local/bin/cosign
          cosign generate-key-pair -passphrase "" || true
          cosign sign --key cosign.key ghcr.io/${{ github.repository }}/secure-gateway:${{ github.sha }} || true
      - name: Push to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image
        run: |
          docker tag ghcr.io/${{ github.repository }}/secure-gateway:${{ github.sha }} ghcr.io/${{ github.repository }}/secure-gateway:latest
          docker push ghcr.io/${{ github.repository }}/secure-gateway:latest || true
