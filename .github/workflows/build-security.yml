name: Build Security Gate
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/secure-gateway:${{ github.sha }} .
      - name: Scan with Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy image --format json --output trivy-report.json ghcr.io/${{ github.repository }}/secure-gateway:${{ github.sha }} || true
      - name: Generate SBOM (syft)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft packages docker:ghcr.io/${{ github.repository }}/secure-gateway:${{ github.sha }} -o cyclonedx-json=sbom.json || true
      - name: Sign image with cosign
        run: |
          curl -sSLf https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64 -o /usr/local/bin/cosign && chmod +x /usr/local/bin/cosign
          cosign generate-key-pair -passphrase "" || true
          cosign sign --key cosign.key ghcr.io/${{ github.repository }}/secure-gateway:${{ github.sha }} || true
      - name: Push to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image
        run: |
          docker tag ghcr.io/${{ github.repository }}/secure-gateway:${{ github.sha }} ghcr.io/${{ github.repository }}/secure-gateway:latest
          docker push ghcr.io/${{ github.repository }}/secure-gateway:latest || true
