name: Build Security Gate
permissions:
  contents: read
  security-events: write
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/secure-gateway:${{ github.sha }} .
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
      - name: Scan with Trivy (SARIF)
        id: trivy-scan
        run: |
          set -o pipefail
          mkdir -p trivy-scan
          # produce SARIF output and exit non-zero on HIGH/CRITICAL
          trivy image --format sarif --output trivy-scan/trivy-report.sarif --severity CRITICAL,HIGH --exit-code 1 ghcr.io/${{ github.repository }}/secure-gateway:${{ github.sha }} || rc=$?
          echo "TRIVY_RC=${rc:-0}" >> $GITHUB_ENV
      - name: Upload Trivy SARIF to GitHub code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-scan/trivy-report.sarif
        if: always()
      - name: Upload trivy SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy-scan/trivy-report.sarif
        if: always()
      - name: Fail if Trivy found critical/high issues
        run: |
          if [ "${TRIVY_RC}" != "0" ]; then
            echo "Trivy detected vulnerabilities (exit ${TRIVY_RC}). Failing job."
            exit ${TRIVY_RC}
          fi
      - name: Generate SBOM (syft)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft packages docker:ghcr.io/${{ github.repository }}/secure-gateway:${{ github.sha }} -o cyclonedx-json=sbom.json || true
      - name: Sign image with cosign
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          curl -sSLf https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64 -o /usr/local/bin/cosign && chmod +x /usr/local/bin/cosign
          if [ -n "${COSIGN_PRIVATE_KEY}" ]; then
            echo "${COSIGN_PRIVATE_KEY}" > cosign.key
            chmod 600 cosign.key
            # export public key for Kyverno manual copy (optional)
            cosign public-key --key cosign.key > cosign.pub || true
            cosign sign --key cosign.key ghcr.io/${{ github.repository }}/secure-gateway:${{ github.sha }}
          else
            echo "COSIGN_PRIVATE_KEY not set; skipping signing" && exit 0
          fi
      - name: Push to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image
        run: |
          docker tag ghcr.io/${{ github.repository }}/secure-gateway:${{ github.sha }} ghcr.io/${{ github.repository }}/secure-gateway:latest
          docker push ghcr.io/${{ github.repository }}/secure-gateway:latest || true

  ai-advisor:
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -q -r requirements.txt
      
      - name: Download trivy SARIF
        uses: actions/download-artifact@v4
        with:
          name: trivy-sarif
          path: ./
        continue-on-error: true
      
      - name: Run AI Security Advisor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 scripts/analyze_findings.py \
            --trivy-sarif trivy-scan/trivy-report.sarif \
            --gate gate2 \
            --output-summary advisor-summary.json
        continue-on-error: true
      
      - name: Upload Advisor Summary
        uses: actions/upload-artifact@v4
        with:
          name: advisor-summary
          path: advisor-summary.json
        if: always()
        continue-on-error: true
