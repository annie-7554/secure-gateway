name: Gate 1 - Code Security

# Run on PRs (catch issues before merge) AND on push to main (gate Gate 2)
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Parallel security scans for speed
  semgrep-sast:
    runs-on: ubuntu-latest
    name: SAST Analysis
    steps:
      - uses: actions/checkout@v4

      # Semgrep: Catch vulnerable code patterns (SQL injection, weak crypto, etc.)
      # Why: Shift-left security - find issues in code review, not production
      - name: Install semgrep
        run: pip install semgrep

      - name: Run Semgrep SAST
        run: |
          semgrep --config .semgrep/rules.yml \
                  --config p/security-audit \
                  --config p/owasp-top-ten \
                  --config p/cwe-top-25 \
                  --sarif --output semgrep.sarif || true

      # Upload results for GitHub Security dashboard visibility
      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('semgrep.sarif') != ''
        with:
          sarif_file: semgrep.sarif
          category: semgrep
        continue-on-error: true

      - name: Fail if semgrep found issues
        run: |
          FINDINGS=$(jq '[.runs[0].results[] | select(.suppressions == null or (.suppressions | length) == 0)] | length' semgrep.sarif 2>/dev/null || echo 0)
          if [ "$FINDINGS" -gt 0 ]; then
            echo "❌ SAST detected $FINDINGS finding(s). Failing gate."
            exit 1
          fi
          echo "✅ No SAST findings."

  secrets-scanning:
    runs-on: ubuntu-latest
    name: Secret Scanning
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed to detect ALL secrets

      # TruffleHog: Scan for accidentally committed secrets (API keys, tokens, etc.)
      # Why: Prevent credential exposure in supply chain
      - name: Run TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: HEAD
          extra_args: --debug

  dependency-scanning:
    runs-on: ubuntu-latest
    name: Dependency Vulnerability Scan
    steps:
      - uses: actions/checkout@v4

      - name: Check SNYK_TOKEN availability
        id: token-check
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -n "${SNYK_TOKEN}" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "SNYK_TOKEN not configured — skipping Snyk scan"
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      # Snyk: Identify known vulnerable dependencies
      # Why: Supply chain security - dependencies are entry point for attacks
      # Requires SNYK_TOKEN secret in repo settings to activate
      - name: Run Snyk dependency scan
        if: steps.token-check.outputs.available == 'true'
        uses: snyk/actions/python-3.11@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --fail-on=all

  # Status check: All gates must pass
  gate-1-status:
    name: Gate 1 - Code Security Status
    runs-on: ubuntu-latest
    needs: [semgrep-sast, secrets-scanning, dependency-scanning]
    if: always()
    steps:
      - name: Check all security scans passed
        run: |
          if [ "${{ needs.semgrep-sast.result }}" != "success" ] || \
             [ "${{ needs.secrets-scanning.result }}" != "success" ] || \
             [ "${{ needs.dependency-scanning.result }}" != "success" ]; then
            echo "❌ Code security gate FAILED"
            echo "Fix issues before merging:"
            echo "  - SAST: Check semgrep findings"
            echo "  - Secrets: Rotate any exposed credentials"
            echo "  - Dependencies: Update or replace vulnerable packages"
            exit 1
          fi
          echo "✅ Code security gate PASSED - Safe to merge"
